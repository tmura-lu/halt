{% extends "base.html" %}

{% block titulo %}Editar Perfil{% endblock %}

{% block conteudo %}
<main class="container mt-4" style="max-width: 600px;">
    <h2>Editar Perfil</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'editar_perfil' %}">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" name="nome"
                   value="{{ user.nome }}" maxlength="50">
        </div>

        <div class="mb-3">
            <label class="form-label">Bio</label>
            <textarea class="form-control" name="bio" rows="3"
                      maxlength="160">{{ user.bio }}</textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">URL da foto de perfil</label>
            <input type="url" class="form-control" name="imagem_perfil_url"
                   value="{{ user.imagem_perfil_url }}">
        </div>

        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Data de nascimento</label>
                <input type="date" class="form-control" name="data_nascimento"
                       value="{{ user.data_nascimento|date:'Y-m-d' }}">
            </div>
            <div class="col mb-3">
                <label class="form-label">Sexo</label>
                <select class="form-select" name="sexo">
                    <option value="">Prefiro não dizer</option>
                    <option value="M" {% if user.sexo == 'M' %}selected{% endif %}>Masculino</option>
                    <option value="F" {% if user.sexo == 'F' %}selected{% endif %}>Feminino</option>
                    <option value="O" {% if user.sexo == 'O' %}selected{% endif %}>Outro</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Peso atual (kg)</label>
                <input type="number" step="0.1" class="form-control" name="peso_atual"
                       value="{{ user.peso_atual }}">
            </div>
            <div class="col mb-3">
                <label class="form-label">Altura (cm)</label>
                <input type="number" step="0.1" class="form-control" name="altura_cm"
                       value="{{ user.altura_cm }}">
            </div>
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" name="is_privado" id="is_privado"
                   {% if user.is_privado %}checked{% endif %}>
            <label class="form-check-label" for="is_privado">Perfil privado</label>
        </div>

        <button type="submit" class="btn btn-primary">Salvar alterações</button>
        <a href="{% url 'principal' %}" class="btn btn-secondary ms-2">Cancelar</a>
    </form>
</main>
{% endblock %}
